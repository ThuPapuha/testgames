const FRAG=`
precision mediump float;
uniform sampler2D u_tex; uniform float u_time,u_off,u_warp; uniform vec2 u_res;
varying vec2 v_uv;
float hash(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
void main(){
  float t=u_time;
  vec2 uv=v_uv;
  float sy=1.0-smoothstep(0.0,0.55,u_off)*0.995;
  float sx=1.0-smoothstep(0.45,0.95,u_off)*0.996;
  uv=(uv-0.5)/vec2(sx,sy)+0.5;
  vec2 cc=uv-0.5;
  float r2=dot(cc,cc);
  vec2 cuv=cc*(1.0+u_warp*r2)+0.5;
  vec2 sm=smoothstep(vec2(0.0),vec2(0.012),cuv)*smoothstep(vec2(1.0),vec2(0.988),cuv);
  float on=sm.x*sm.y;
  float ab=0.004+0.016*r2;
  vec3 col;
  col.r=texture2D(u_tex,cuv+cc*ab).r;
  col.g=texture2D(u_tex,cuv).g;
  col.b=texture2D(u_tex,cuv-cc*ab).b;
  float sl=0.80+0.20*sin(cuv.y*720.0*2.0943951);
  vec3 mk=vec3(sin(cuv.x*960.0*2.0944),sin(cuv.x*960.0*2.0944+2.0944),sin(cuv.x*960.0*2.0944+4.1888))*0.5+0.5;
  col*=sl*mix(vec3(1.0),mk*0.5+0.5,0.22);
  col+=0.05*smoothstep(0.55,1.0,sin(cuv.y*4.0-t*1.7));
  col*=1.0-0.03*hash(vec2(floor(t*60.0),3.7));
  col+=(hash(cuv*u_res+t)-0.5)*0.05;
  col*=clamp(1.0-r2*1.15,0.22,1.0);
  col=pow(col,vec3(0.9));
  float bright=1.0+smoothstep(0.05,0.5,u_off)*2.2;
  float fade=1.0-smoothstep(0.72,1.0,u_off);
  gl_FragColor=vec4(col*bright*fade*on,1.0);
}`;

      if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
    const prog=gl.createProgram();

let AC=null, master, musicGain, sfxGain, echo, noiseBuf;

}
function tone(o){
  if(!AC) return;
  const {type='square',f0=440,f1=null,t=0.1,vol=0.2,delay=0,dest=null}=o;
  const osc=AC.createOscillator(), gn=AC.createGain(), now=AC.currentTime+Math.max(0,delay);
  osc.type=type; osc.frequency.setValueAtTime(f0,now);
  if(f1) osc.frequency.exponentialRampToValueAtTime(Math.max(f1,1),now+t);
  gn.gain.setValueAtTime(0.0001,now);
  gn.gain.exponentialRampToValueAtTime(vol,now+0.008);
  gn.gain.exponentialRampToValueAtTime(0.0001,now+t);
  osc.connect(gn); gn.connect(dest||sfxGain);
  osc.start(now); osc.stop(now+t+0.03);
}
function noiseHit(o){
  if(!AC) return;
  const {t=0.2,vol=0.2,ftype='lowpass',f=800,delay=0,dest=null}=o;
  const src=AC.createBufferSource(); src.buffer=noiseBuf; src.loop=true;
  const fl=AC.createBiquadFilter(); fl.type=ftype; fl.frequency.value=f;
  const gn=AC.createGain(), now=AC.currentTime+Math.max(0,delay);
  gn.gain.setValueAtTime(vol,now);
  gn.gain.exponentialRampToValueAtTime(0.0001,now+t);
  src.connect(fl); fl.connect(gn); gn.connect(dest||sfxGain);
  src.start(now); src.stop(now+t+0.03);
}

  const o=AC.createOscillator(),gn=AC.createGain();

  gn.gain.setValueAtTime(0.0001,t);
  gn.gain.exponentialRampToValueAtTime(0.11,t+0.012);
  gn.gain.exponentialRampToValueAtTime(0.07,t+d*0.6);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(gn); gn.connect(musicGain); gn.connect(echo);
  o.start(t); o.stop(t+d+0.03);
}
function bassNote(t,m,d){
  const o=AC.createOscillator(),fl=AC.createBiquadFilter(),gn=AC.createGain();
  o.type='triangle'; o.frequency.value=mtof(m);
  fl.type='lowpass'; fl.frequency.value=520;
  gn.gain.setValueAtTime(0.0001,t);
  gn.gain.exponentialRampToValueAtTime(0.2,t+0.015);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(fl); fl.connect(gn); gn.connect(musicGain);
  o.start(t); o.stop(t+d+0.03);
}
function drumHit(t,s){
  const dl=Math.max(0,t-AC.currentTime);
  noiseHit({t:0.03,vol:0.035,f:7000,ftype:'highpass',dest:musicGain,delay:dl});
  if(s%2===0){const b=s/2;
    if(b%4===0||b%4===2)tone({type:'sine',f0:130,f1:44,t:0.12,vol:0.24,delay:dl,dest:musicGain});
    else{noiseHit({t:0.07,vol:0.09,f:1800,ftype:'bandpass',dest:musicGain,delay:dl});
         tone({f0:190,t:0.05,vol:0.06,delay:dl,dest:musicGain});}}
}
function musicTick(){
  if(!music.on||!AC) return;
  const hz=AC.currentTime+0.18;
  while(music.mT<hz){const[m,b]=MELODY[music.mI],d=b*SPB;
    if(m>0)leadNote(music.mT,m,d*0.92); music.mT+=d; music.mI=(music.mI+1)%MELODY.length;}
  while(music.bT<hz){const[m,b]=BASS[music.bI],d=b*SPB;
    if(m>0)bassNote(music.bT,m,d*0.85); music.bT+=d; music.bI=(music.bI+1)%BASS.length;}
  while(music.dT<hz){drumHit(music.dT,music.dS); music.dT+=SPB*0.5; music.dS++;}
}
function startMusic(){ if(!AC)return; stopMusic();
  const t0=AC.currentTime+0.1;
  music.mT=music.bT=music.dT=t0; music.mI=music.bI=music.dS=0; music.on=true;
  music.tm=setInterval(musicTick,30);}
function stopMusic(){music.on=false; if(music.tm){clearInterval(music.tm);music.tm=null;}}

/* ================= FX ================= */
function shake(mag,dur){ if(mag>shakeMag){shakeMag=mag;shakeT=dur;shakeDur=dur;} }
function burst(x,y,n,color,spd=180,grav=300){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),v=rnd(spd*0.3,spd);
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-60,g:grav,life:rnd(350,750),max:750,s:rnd(2,4.5),color});}}
function ring(x,y,color,vr=260){rings.push({x,y,r:6,vr,life:450,max:450,color,lw:3});}
function bolt(x,y,color='#aaffcc'){const pts=[[x,y]];let cx=x,cy=y;
  for(let i=0;i<6;i++){cx+=rnd(-16,16);cy+=rnd(6,22);pts.push([cx,cy]);}
  bolts.push({pts,life:140,max:140,color});}
function popup(x,y,text,color='#00ff41',size=22){pops.push({x,y,text,color,size,life:1300,max:1300});}
function popupBoard(p,text,color,size){popup(p.bx+p.bw/2,p.by+p.bh*0.35,text,color,size||22);}
function makeCrack(){const pts=[];let x=rnd(100,W-100),y=rnd(60,160),a=rnd(0.6,2.4);
  for(let i=0;i<ri(6)+8;i++){pts.push([x,y]);const l=rnd(20,55);a+=rnd(-0.5,0.5);
    x+=Math.cos(a)*l;y+=Math.sin(a)*l;}
  return{pts,life:2200,max:2200};}
function updFX(dt){
  if(shakeT>0)shakeT-=dt; else shakeMag=0;
  parts=parts.filter(p=>{p.life-=dt;p.vy+=p.g*dt/1000;p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;return p.life>0;});
  rings=rings.filter(r=>{r.life-=dt;r.r+=r.vr*dt/1000;return r.life>0;});
  bolts=bolts.filter(b=>{b.life-=dt;return b.life>0;});
  pops=pops.filter(p=>{p.life-=dt;p.y-=28*dt/1000;return p.life>0;});
  cracks=cracks.filter(c=>{c.life-=dt;return c.life>0;});
  trails=trails.filter(t=>{t.life-=dt;return t.life>0;});
  if(banner){banner.t-=dt;if(banner.t<=0)banner=null;}
  if(alertT>0)alertT-=dt;
}
function drawFX(gg){
  parts.forEach(p=>{gg.globalAlpha=clamp(p.life/p.max,0,1);gg.fillStyle=p.color;
    gg.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);});
  gg.globalAlpha=1;
  rings.forEach(r=>{gg.globalAlpha=clamp(r.life/r.max,0,1);gg.strokeStyle=r.color;gg.lineWidth=r.lw;
    gg.beginPath();gg.arc(r.x,r.y,r.r,0,7);gg.stroke();});
  gg.globalAlpha=1;
  bolts.forEach(b=>{gg.globalAlpha=clamp(b.life/b.max,0,1);gg.strokeStyle=b.color;gg.lineWidth=2;
    gg.shadowColor=b.color;gg.shadowBlur=8;gg.beginPath();
    b.pts.forEach((p,i)=>i?gg.lineTo(p[0],p[1]):gg.moveTo(p[0],p[1]));gg.stroke();gg.shadowBlur=0;});
  gg.globalAlpha=1;
  cracks.forEach(c=>{gg.globalAlpha=clamp(c.life/c.max,0,1)*0.55;gg.strokeStyle='#ccffdd';gg.lineWidth=1.5;
    gg.beginPath();c.pts.forEach((p,i)=>i?gg.lineTo(p[0],p[1]):gg.moveTo(p[0],p[1]));gg.stroke();});
  gg.globalAlpha=1;
  pops.forEach(p=>{gg.globalAlpha=clamp(p.life/p.max,0,1);gg.font=p.size+'px '+FONT_D;
    gg.textAlign='center';gg.shadowColor=p.color;gg.shadowBlur=10;gg.fillStyle=p.color;
    gg.fillText(p.text,p.x,p.y);gg.shadowBlur=0;});

}

/* ================= RED · PeerJS P2P ================= */
const Net={
  peer:null, conns:{}, conn:null, isHost:false, slot:0, code:'',
  lobby:[], status:'', err:'', started:false
};
const CODECH='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const genCode=()=>Array.from({length:5},()=>CODECH[ri(CODECH.length)]).join('');
function netSend(conn,obj){try{if(conn&&conn.open)conn.send(obj);}catch(e){}}
function hostBroadcast(obj,exceptSlot){
  Object.entries(Net.conns).forEach(([s,c])=>{if(+s!==exceptSlot)netSend(c,obj);});
}
function cleanupNet(){
  Object.values(Net.conns).forEach(c=>{try{c.close();}catch(e){}});
  if(Net.conn){try{Net.conn.close();}catch(e){}}
  if(Net.peer){try{Net.peer.destroy();}catch(e){}}
  Net.peer=null;Net.conns={};Net.conn=null;Net.isHost=false;Net.slot=0;
  Net.lobby=[];Net.status='';Net.started=false;
}
function netErrText(t){
  return ({'unavailable-id':'CÓDIGO DE SALA OCUPADO, REINTENTA','peer-unavailable':'SALA NO ENCONTRADA: '+joinCode,
    'network':'SIN CONEXIÓN A INTERNET','server-error':'SERVIDOR P2P SATURADO, REINTENTA',
    'socket-error':'ENLACE P2P FALLIDO'}[t])||('ERROR P2P: '+t);
}
function hostGame(){
  if(typeof Peer==='undefined'){Net.err='SIN LIBRERÍA P2P · ¿HAY INTERNET?';state='menu';return;}
  cleanupNet();
  Net.isHost=true; Net.code=genCode(); Net.status='ABRIENDO CANAL P2P...';
  SFX.modem();
  Net.peer=new Peer('TETCRT1-'+Net.code);
  Net.peer.on('open',()=>{
    Net.slot=0; Net.lobby=[{slot:0,name:'P1',host:true}];
    Net.status=''; state='lobby'; stateT=0;
  });
  Net.peer.on('error',e=>{
    if(e.type==='unavailable-id'){try{Net.peer.destroy();}catch(_){}Net.peer=null;Net.conns={};hostGame();return;}
    Net.err=netErrText(e.type); cleanupNet(); state='menu';
  });
  Net.peer.on('connection',c=>{
    if(Object.keys(Net.conns).length>=3){
      c.on('open',()=>{netSend(c,{t:'full'});setTimeout(()=>{try{c.close();}catch(e){}},400);});
      return;
    }
    c.on('data',d=>hostOnData(c,d));
    c.on('close',()=>{
      const s=c._slot; if(s==null)return;
      delete Net.conns[s];
      Net.lobby=Net.lobby.filter(p=>p.slot!==s);
      if(Net.started&&(state==='playing'||state==='countdown')){
        markRemoteDead(s,99,true);
        hostBroadcast({t:'pdead',slot:s,rank:99,dc:true});
        hostCheckEnd();
      }else hostBroadcastLobby();
    });
  });
}
function hostOnData(c,d){
  if(!d||!d.t)return;
  if(d.t==='hi'){
    const used=new Set(Object.values(Net.conns).map(x=>x._slot));
    let slot=1; while(used.has(slot))slot++;
    c._slot=slot; Net.conns[slot]=c;
    Net.lobby.push({slot,name:'P'+(slot+1),host:false});
    netSend(c,{t:'welcome',slot});
    hostBroadcastLobby(); SFX.power();
  }
  else if(d.t==='snap'){hostBroadcast({t:'snap',slot:c._slot,s:d.s},c._slot);applyRemoteSnap(c._slot,d.s);}
  else if(d.t==='attack'){routeAttack(c._slot,d);}
  else if(d.t==='dead'){
    hostBroadcast({t:'pdead',slot:c._slot,rank:d.rank});
    markRemoteDead(c._slot,d.rank,false);
    hostCheckEnd();
  }
}
function routeAttack(from,d){
  if(d.to===0)applyAttackLocal(d.kind,d.n,from);
  else if(Net.conns[d.to])netSend(Net.conns[d.to],{t:'attack',kind:d.kind,n:d.n,from});
}
function hostBroadcastLobby(){hostBroadcast({t:'lobby',players:Net.lobby});}
function joinGame(code){
  if(typeof Peer==='undefined'){Net.err='SIN LIBRERÍA P2P · ¿HAY INTERNET?';state='menu';return;}
  cleanupNet();
  Net.isHost=false; Net.code=code; Net.status='MARCANDO '+code+'...';
  state='joinwait'; stateT=0; SFX.modem();
  Net.peer=new Peer();
  Net.peer.on('open',()=>{
    Net.conn=Net.peer.connect('TETCRT1-'+code,{reliable:true});
    Net.conn.on('open',()=>{netSend(Net.conn,{t:'hi'});
      Net.joinTO=setTimeout(()=>{Net.err='LA SALA '+code+' NO RESPONDE';cleanupNet();state='menu';},7000);});
    Net.conn.on('data',d=>guestOnData(d));
    Net.conn.on('close',()=>{
      if(state==='playing'||state==='lobby'||state==='countdown'||state==='gameover'){
        banner={text:'✂ SE PERDIÓ AL ANFITRIÓN',t:2600};
        setTimeout(()=>{cleanupNet();toMenu();},2600);
      }
    });
  });
  Net.peer.on('error',e=>{Net.err=netErrText(e.type);cleanupNet();state='menu';});
}
function guestOnData(d){
  if(!d||!d.t)return;
  if(d.t==='full'){Net.err='LA SALA ESTÁ LLENA (4/4)';cleanupNet();state='menu';return;}
  if(d.t==='welcome'){clearTimeout(Net.joinTO);Net.slot=d.slot;Net.status='';state='lobby';stateT=0;SFX.select();}
  else if(d.t==='lobby'){Net.lobby=d.players;}
  else if(d.t==='start'){netCountdownStart();}
  else if(d.t==='snap'){if(d.slot!==Net.slot)applyRemoteSnap(d.slot,d.s);}
  else if(d.t==='event'){onEventMsg(d);}
  else if(d.t==='attack'){applyAttackLocal(d.kind,d.n,d.from);}
  else if(d.t==='pdead'){markRemoteDead(d.slot,d.rank,!!d.dc);}
  else if(d.t==='over'){netShowOver(d.winner);}
}
/* ---- snapshots ---- */
function makeSnap(p){
  const b=[];for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)b.push(p.board[y][x]?ENC[p.board[y][x]]:0);
  return {b,sc:p.score,ln:p.lines,lv:p.level,al:p.alive?1:0,rk:p.rank,
    nx:p.next?p.next.name:null,
    pc:p.piece?{n:p.piece.name,x:p.piece.x,y:p.piece.y,c:p.piece.cells}:null,
    pw:p.powerup?p.powerup.code:null,sh:p.shields,cb:p.combo,pg:p.pendingG,
    cl:p.clearing?p.clearing.rows:null,
    fx:{sl:p.slowT>0,sp:p.speedT>0,fr:p.freezeT>0,iv:p.invertT>0,fg:p.fogT>0,bo:p.blackoutT>0},
    dn:p.danger?1:0};
}
function sendSnap(){
  if(mode!=='net'||state!=='playing')return;
  const s=makeSnap(self);
  if(Net.isHost){hostBroadcast({t:'snap',slot:0,s});}
  else netSend(Net.conn,{t:'snap',s});
}
function applyRemoteSnap(slot,s){
  const rp=players.find(p=>p.slot===slot&&p.remote);
  if(rp)rp.snap=s;
  aliveMap[slot]=!!s.al;
}
/* ---- ataques / eventos en red ---- */
function livingOpponentSlots(){
  const out=[];
  players.forEach(p=>{if(p.slot!==Net.slot){
    const al=p.remote?(aliveMap[p.slot]!==false&&p.snap&&p.snap.al!==0):p.alive;
    if(al)out.push(p.slot);}});
  return out;
}
function sendAttack(kind,n,to){
  if(Net.isHost)routeAttack(Net.slot,{kind,n,to});
  else netSend(Net.conn,{t:'attack',kind,n,to});
}
function applyAttackLocal(kind,n,from){
  if(!self||!self.alive)return;
  const fromName='P'+(from+1);
  if(kind==='slow'){self.slowT=8000;popupBoard(self,fromName+': ¡LENTO 8s!','#ffdd66',20);}
  else if(kind==='blackout'){blackoutPlayer(self,4000);popupBoard(self,fromName+': APAGÓN','#ff8866',20);}
  else if(kind==='quake'){quakePlayer(self);popupBoard(self,fromName+': TERREMOTO','#ffaa55',20);}
  else if(kind==='garbage'){self.pendingG+=n;SFX.garbage();popupBoard(self,fromName+': +'+n+' BASURA','#ff6655',20);}
}
function hostTriggerEvent(){
  const pool=EVENTS.filter(e=>e.id!==lastEventId);
  const ev=pool[ri(pool.length)];lastEventId=ev.id;
  const targets=[];
  players.forEach(p=>{
    const al=p.remote?(aliveMap[p.slot]!==false):p.alive;
    if(al)targets.push(p.slot);});
  hostBroadcast({t:'event',id:ev.id,dur:ev.dur,targets});
  onEventMsg({id:ev.id,dur:ev.dur,targets});
}
function onEventMsg(d){
  const ev=EVENTS.find(e=>e.id===d.id); if(!ev)return;
  globalEvent={...ev,tEnd:gameTime+d.dur};
  banner={text:'▲ '+ev.name+' ▲',t:2600};alertText=ev.name;alertT=d.dur;
  const hitMe=d.targets.includes(mode==='net'?Net.slot:0)||mode==='solo';
  if(mode==='net'&&!Net.isHost){/* solo el anfitrión programa el siguiente */globalEvent.tEnd=gameTime+d.dur;}
  if(hitMe&&self&&self.alive){
    if(self.shields>0){self.shields--;popupBoard(self,'ESCUDO BLOQUEÓ EVENTO','#88ffdd',20);SFX.shield();
      ring(self.bx+self.bw/2,self.by+self.bh/2,'#66ffcc',300);}
    else{
      if(ev.id==='quake')quakePlayer(self);
      if(ev.id==='blackout')blackoutPlayer(self,d.dur);
      if(ev.id==='invert')self.invertT=d.dur;
      if(ev.id==='fog')self.fogT=d.dur;
    }
  }
  if(ev.id==='quake'){SFX.quake();shake(11,2600);cracks.push(makeCrack(),makeCrack());}
  else if(ev.id==='invert'&&hitMe)SFX.invert();
  else if(ev.id==='fog'&&hitMe)SFX.fog();
  else if(ev.id==='storm'){SFX.storm();stormAcc=0;}
}
function hostCheckEnd(){
  const alive=Net.lobby.filter(p=>{
    if(p.slot===0)return self&&self.alive;
    return aliveMap[p.slot]!==false;});
  if(alive.length<=1&&Net.started&&pendingEnd===null){
    const winner=alive.length===1?alive[0].slot:-1;
    hostBroadcast({t:'over',winner});
    netShowOver(winner);
  }
}
function netCountdownStart(){
  Net.started=true;
  buildOnlineBoards();
  state='countdown';countT=0;SFX.count();
}
function netShowOver(winnerSlot){
  pendingEnd=null;
  winnerInfo=winnerSlot===-1?'EMPATE':(winnerSlot===Net.slot?'¡TÚ GANAS!':'GANA P'+(winnerSlot+1));
  if(winnerSlot===Net.slot){newRecord=true;}
  stopMusic();SFX.over();

function markRemoteDead(slot,rank,dc){
  aliveMap[slot]=false;
  const rp=players.find(p=>p.slot===slot&&p.remote);
  if(rp){if(rp.snap)rp.snap={...rp.snap,al:0,rk:rank};

/* ================= JUGADOR LOCAL ================= */
class Player{
  constructor(slot,bx,by,cell,keys){
    this.slot=slot;this.bx=bx;this.by=by;this.cell=cell;
    this.bw=cell*COLS;this.bh=cell*ROWS;
    this.keys=keys;this.remote=false;
    this.label='P'+(slot+1);
    this.garbSide=(bx+this.bw/2<W/2)?1:-1;
    this.tagY=by+this.bh+(cell<20?58:22);
    this.reset();
  }
  reset(){
    this.board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    this.score=0;this.lines=0;this.level=1;this.combo=0;
    this.alive=true;this.piece=null;this.next=this.randPiece();this.powerup=null;this.shields=0;
    this.dropInt=800;this.dropTimer=0;this.softAcc=0;
    this.slowT=0;this.speedT=0;this.freezeT=0;this.invertT=0;this.fogT=0;this.blackoutT=0;this.shakeT=0;
    this.pendingG=0;this.clearing=null;this.flashCells=[];this.falling=[];this.danger=false;this.dangerCd=0;
    this.rank=0;
    this.spawnPiece();
  }
  randPiece(){const n=PNAMES[ri(PNAMES.length)];return{name:n,cells:SHAPES[n].map(c=>[...c]),x:3,y:0};}
  spawnPiece(){this.piece=this.next;this.next=this.randPiece();
    this.piece.x=3;this.piece.y=0;
    if(this.collides(0,0))this.die();}
  collides(dx,dy,cells){const cs=cells||this.piece.cells;
    for(const[cx,cy]of cs){const nx=this.piece.x+cx+dx,ny=this.piece.y+cy+dy;
      if(nx<0||nx>=COLS||ny>=ROWS)return true;
      if(ny>=0&&this.board[ny][nx])return true;}return false;}
  dropSpeed(){let s=this.dropInt;if(this.slowT>0)s*=2.2;if(this.speedT>0)s*=0.45;return s;}
  moveRaw(d){if(!this.piece||this.clearing)return false;
    if(!this.collides(d,0)){this.piece.x+=d;return true;}return false;}
  move(d){const dir=this.invertT>0?-d:d;if(this.moveRaw(dir))SFX.move();}
  rotate(){if(!this.piece||this.clearing||this.piece.name==='O')return;
    const rot=this.piece.cells.map(([x,y])=>[-y,x]);
    const mx=Math.min(...rot.map(c=>c[0])),my=Math.min(...rot.map(c=>c[1]));
    const norm=rot.map(([x,y])=>[x-mx,y-my]);const old=this.piece.cells;
    this.piece.cells=norm;
    for(const k of[0,-1,1,-2,2]){if(!this.collides(k,0)){this.piece.x+=k;SFX.rotate();return;}}
    this.piece.cells=old;}
  softDrop(){if(!this.piece||this.clearing)return;
    if(!this.collides(0,1)){this.piece.y++;this.score++;SFX.soft();}else this.lockPiece();}
  hardDrop(){if(!this.piece||this.clearing)return;let d=0;
    const cols=new Set(this.piece.cells.map(c=>this.piece.x+c[0]));
    while(!this.collides(0,1)){this.piece.y++;d++;}
    this.score+=d*2;
    cols.forEach(cx=>trails.push({x:this.bx+cx*this.cell,y:this.by,w:this.cell,life:160,max:160}));
    SFX.hard();shake(2,120);
    burst(this.bx+this.bw/2,this.by+this.piece.y*this.cell+this.cell,8,'#88ffaa',120,420);
    this.lockPiece();}
  lockPiece(){
    let topOut=false;
    for(const[cx,cy]of this.piece.cells){const bx=this.piece.x+cx,by=this.piece.y+cy;
      if(by<0){topOut=true;continue;}this.board[by][bx]=this.piece.name;
      this.flashCells.push({x:bx,y:by,t:130});}
    SFX.lock();
    burst(this.bx+this.piece.x*this.cell+this.cell,this.by+(this.piece.y+1)*this.cell,4,'#55dd77',90,380);
    if(topOut){this.die();return;}
    const rows=[];for(let y=0;y<ROWS;y++)if(this.board[y].every(c=>c!==null))rows.push(y);
    if(rows.length){this.clearing={rows,t:0,dur:340,n:rows.length};SFX.clearStart();}
    else{this.combo=0;this.applyPendingGarbage();if(this.alive)this.spawnPiece();}
  }
  finishClear(){
    const n=this.clearing.n,rows=this.clearing.rows;
    rows.forEach(y=>{for(let x=0;x<COLS;x++)
      burst(this.bx+x*this.cell+this.cell/2,this.by+y*this.cell+this.cell/2,2,COLORS[this.board[y][x]]||'#00ff41',200,360);});
    rows.sort((a,b)=>a-b).forEach(y=>{this.board.splice(y,1);this.board.unshift(Array(COLS).fill(null));});
    const pts=[0,100,300,500,800][n]*this.level;this.score+=pts;this.lines+=n;
    popupBoard(this,'+'+pts,'#aaffcc',this.cell<20?18:26);
    if(n===4)popupBoard(this,'¡¡ TETRIS !!','#ffffff',this.cell<20?24:34);
    this.combo++;
    if(this.combo>=2){popupBoard(this,'COMBO x'+this.combo,'#66ff99',this.cell<20?18:24);SFX.combo(this.combo);}
    SFX.clear(n);ring(this.bx+this.bw/2,this.by+rows[0]*this.cell,'#00ff41',320);
    const nl=Math.floor(this.lines/10)+1;
    if(nl>this.level){this.level=nl;this.dropInt=Math.max(90,800-(nl-1)*70);
      popupBoard(this,'NIVEL '+nl,'#ffffff',this.cell<20?20:30);SFX.level();}
    if(Math.random()<0.35){
      const pu=POWERUPS[ri(POWERUPS.length)];
      if(pu.id==='shield'){this.shields=Math.min(2,this.shields+1);popupBoard(this,'+ ESCUDO','#88ffdd',this.cell<20?18:24);}
      else{this.powerup=pu;popupBoard(this,'ITEM ['+pu.code+']','#ccffaa',this.cell<20?16:22);}
      SFX.power();ring(this.bx+this.bw/2,this.by+this.bh*0.4,'#aaffcc',200);}
    // enviar basura / ataques por la red
    if(mode==='net'&&n>=2){
      const foes=livingOpponentSlots();
      if(foes.length){const to=foes[ri(foes.length)];
        sendAttack('garbage',n-1,to);
        popupBoard(this,'→ P'+(to+1)+' +'+(n-1)+' BASURA','#ff9977',this.cell<20?16:20);}}
    this.applyPendingGarbage();
    this.clearing=null;
    if(this.alive)this.spawnPiece();
  }
  applyPendingGarbage(){if(this.pendingG<=0)return;
    for(let i=0;i<this.pendingG;i++){this.board.shift();
      const row=Array(COLS).fill('G');row[ri(COLS)]=null;this.board.push(row);}
    popupBoard(this,'+'+this.pendingG+' BASURA','#ff6655',this.cell<20?16:22);
    this.pendingG=0;shake(4,200);this.shakeT=250;}
  usePowerup(){
    if(!this.powerup||!this.alive||this.clearing)return;
    const pu=this.powerup;this.powerup=null;SFX.use();
    ring(this.bx+this.bw/2,this.by+this.bh/2,'#ccffcc',380);
    popupBoard(this,pu.name+'!','#ffffff',this.cell<20?20:28);
    const foes=mode==='net'?livingOpponentSlots():[];
    if(pu.tgt){
      if(mode==='net'&&foes.length){
        const to=foes[ri(foes.length)];
        const kind=pu.id==='garbage'?'garbage':pu.id;
        sendAttack(kind,pu.id==='garbage'?3:0,to);
        popupBoard(this,'→ P'+(to+1)+' '+pu.name,'#ff9977',this.cell<20?16:20);
      }else if(mode==='solo'){
        popupBoard(this,'SIN RIVALES · +500','#aaffcc',20);this.score+=500;
      }else popupBoard(this,'SIN RIVALES VIVOS','#777777',16);
      if(pu.id==='slow'&&mode==='solo'){this.freezeT=5000;popupBoard(this,'GRAVEDAD CONGELADA','#aaffff',20);}
      return;
    }
    switch(pu.id){
      case'bomb':{if(!this.piece)break;
        const cx=clamp(this.piece.x+1,0,COLS-1),cy=clamp(this.piece.y+1,0,ROWS-1);
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const bx=cx+dx,by=cy+dy;
          if(by>=0&&by<ROWS&&bx>=0&&bx<COLS&&this.board[by][bx]){
            burst(this.bx+bx*this.cell+this.cell/2,this.by+by*this.cell+this.cell/2,3,'#ffcc66',180,300);
            this.board[by][bx]=null;}}
        this.applyGravity();shake(6,300);noiseHit({t:0.4,vol:0.4,f:180});break;}
      case'clear2':this.board.splice(ROWS-2,2);this.board.unshift(Array(COLS).fill(null),Array(COLS).fill(null));
        ring(this.bx+this.bw/2,this.by+this.bh-30,'#00ff41',300);break;
      case'speed':this.speedT=6000;break;
      case'shield':this.shields=Math.min(2,this.shields+1);SFX.shield();break;
    }
  }
  applyGravity(){for(let x=0;x<COLS;x++){let w=ROWS-1;
    for(let y=ROWS-1;y>=0;y--)if(this.board[y][x]){this.board[w][x]=this.board[y][x];if(w!==y)this.board[y][x]=null;w--;}
    for(let y=w;y>=0;y--)this.board[y][x]=null;}}
  die(){
    if(!this.alive)return;
    this.alive=false;this.piece=null;
    SFX.ko();shake(9,700);
    burst(this.bx+this.bw/2,this.by+this.bh*0.3,40,'#ff6644',260,300);
    if(mode==='solo'){this.rank=1;if(pendingEnd===null)pendingEnd=1500;}
    else{
      const aliveCount=players.filter(p=>p.remote?(aliveMap[p.slot]!==false&&(!p.snap||p.snap.al!==0)):p.alive).length;
      this.rank=aliveCount+1;
      banner={text:'HAS SIDO ELIMINADO · '+this.rank+'º',t:2600};
      if(Net.isHost){hostBroadcast({t:'pdead',slot:Net.slot,rank:this.rank});hostCheckEnd();}
      else netSend(Net.conn,{t:'dead',rank:this.rank});
    }
  }
  ghostY(){let gy=0;while(!this.collides(0,gy+1))gy++;return gy;}
  update(dt){
    if(!this.alive)return;
    ['slowT','speedT','freezeT','invertT','fogT','blackoutT','shakeT','dangerCd'].forEach(k=>{if(this[k]>0)this[k]-=dt;});
    this.flashCells=this.flashCells.filter(f=>(f.t-=dt)>0);
    if(this.clearing){this.clearing.t+=dt;if(this.clearing.t>=this.clearing.dur)this.finishClear();return;}
    if(!this.piece)return;
    if(this.freezeT<=0){
      this.dropTimer+=dt;
      if(this.dropTimer>=this.dropSpeed()){this.dropTimer=0;
        if(!this.collides(0,1))this.piece.y++;else this.lockPiece();}}
    this.falling=this.falling.filter(fb=>{fb.y+=fb.v*dt/1000;
      let top=ROWS;for(let y=0;y<ROWS;y++)if(this.board[y][fb.x]){top=y;break;}
      const landY=(top-1)*this.cell;
      if(fb.y>=landY){const row=top-1;
        if(row<0){this.die();return false;}
        this.board[row][fb.x]='G';
        burst(this.bx+fb.x*this.cell+this.cell/2,this.by+row*this.cell+this.cell/2,4,'#99ffaa',110,300);
        this.shakeT=150;return false;}
      return true;});
    const dng=this.board.slice(0,4).some(r=>r.some(c=>c));
    if(dng&&!this.danger&&this.dangerCd<=0){SFX.danger();this.dangerCd=2500;}
    this.danger=dng;
    if(this.blackoutT>0&&Math.random()<0.25)
      bolt(this.bx+rnd(10,this.bw-10),this.by+rnd(10,this.bh*0.5));
  }
  draw(gg,now){
    const bx=this.bx,by=this.by,cl=this.cell,bw=this.bw,bh=this.bh;
    gg.save();
    if(this.shakeT>0)gg.translate(rnd(-3,3),rnd(-3,3));
    gg.fillStyle='rgba(0,9,2,.82)';gg.fillRect(bx,by,bw,bh);
    gg.strokeStyle='rgba(0,255,65,.06)';gg.lineWidth=1;
    for(let x=1;x<COLS;x++){gg.beginPath();gg.moveTo(bx+x*cl,by);gg.lineTo(bx+x*cl,by+bh);gg.stroke();}
    for(let y=1;y<ROWS;y++){gg.beginPath();gg.moveTo(bx,by+y*cl);gg.lineTo(bx+bw,by+y*cl);gg.stroke();}
    const sc=cl/26;
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)
      if(this.board[y][x]){gg.save();gg.translate(bx+x*cl,by+y*cl);gg.scale(sc,sc);
        gg.drawImage(SPR[this.board[y][x]],0,0);gg.restore();}
    trails.forEach(t=>{gg.globalAlpha=t.life/t.max*0.25;gg.fillStyle='#88ffaa';
      gg.fillRect(t.x,t.y,t.w,bh);});gg.globalAlpha=1;
    if(this.clearing){const ph=Math.sin(this.clearing.t*0.035);
      this.clearing.rows.forEach(y=>{gg.globalAlpha=0.4+0.4*Math.abs(ph);
        gg.fillStyle=ph>0?'#ffffff':'#aaffcc';gg.fillRect(bx,by+y*cl,bw,cl);});
      gg.globalAlpha=1;}
    if(this.piece&&!this.clearing){
      const gy=this.ghostY();
      gg.strokeStyle=COLORS[this.piece.name];gg.globalAlpha=0.3;gg.setLineDash([3,3]);
      this.piece.cells.forEach(([cx,cy])=>{const px=bx+(this.piece.x+cx)*cl,py=by+(this.piece.y+cy+gy)*cl;
        if(py>=by)gg.strokeRect(px+2,py+2,cl-4,cl-4);});
      gg.setLineDash([]);gg.globalAlpha=1;
      this.piece.cells.forEach(([cx,cy])=>{const py=this.piece.y+cy;
        if(py>=0){gg.save();gg.translate(bx+(this.piece.x+cx)*cl,by+py*cl);gg.scale(sc,sc);
          gg.drawImage(SPR[this.piece.name],0,0);gg.restore();}});
    }
    this.flashCells.forEach(f=>{gg.globalAlpha=f.t/130*0.7;gg.fillStyle='#ffffff';
      gg.fillRect(bx+f.x*cl,by+f.y*cl,cl,cl);});gg.globalAlpha=1;
    this.falling.forEach(fb=>{gg.save();gg.translate(bx+fb.x*cl,by+fb.y);gg.scale(sc,sc);
      gg.drawImage(SPR.G,0,0);gg.restore();
      gg.globalAlpha=0.4;gg.fillStyle='#aaffcc';
      gg.fillRect(bx+fb.x*cl+2,by+fb.y-12,cl-4,8);gg.globalAlpha=1;});
    if(this.blackoutT>0){
      const fl=Math.random()<0.1?0.5:0.94;
      gg.fillStyle=`rgba(0,0,0,${fl})`;gg.fillRect(bx,by,bw,bh);
      if(Math.random()<0.4){gg.fillStyle='rgba(170,255,200,.5)';
        gg.fillRect(bx+rnd(0,bw-60),by+rnd(0,bh),rnd(20,60),2);}}
    if(this.fogT>0){const gr=gg.createLinearGradient(0,by+bh*0.4,0,by+bh);
      gr.addColorStop(0,'rgba(0,14,2,0)');gr.addColorStop(0.5,'rgba(0,14,2,.88)');
      gr.addColorStop(1,'rgba(2,20,4,.97)');gg.fillStyle=gr;gg.fillRect(bx,by,bw,bh);
      gg.font=(cl<20?11:18)+'px '+FONT_D;gg.fillStyle='rgba(60,140,80,.5)';
      for(let i=0;i<3;i++)gg.fillText('▒▓░▒▓',bx+((now/900+i*0.33)%1)*bw-40,by+bh-14-i*(cl<20?16:26));}
    if(this.freezeT>0){gg.fillStyle='rgba(180,255,255,.07)';gg.fillRect(bx,by,bw,bh);
      this.tag(gg,'❄ GRAVEDAD CONGELADA','#aaffff',now);}
    if(this.slowT>0)this.tag(gg,'▼ LENTO','#ffdd66',now);
    if(this.speedT>0)this.tag(gg,'▲ VELOCIDAD x2','#66ffcc',now);
    if(this.invertT>0)this.tag(gg,'⇄ INVERTIDO ⇄','#ff88aa',now,true);
    if(this.danger){const a=0.25+0.2*Math.sin(now/120);
      const gr=gg.createLinearGradient(0,by,0,by+110);
      gr.addColorStop(0,`rgba(255,30,30,${a})`);gr.addColorStop(1,'rgba(255,0,0,0)');
      gg.fillStyle=gr;gg.fillRect(bx,by,bw,110);
      gg.strokeStyle=`rgba(255,60,60,${a+0.3})`;gg.lineWidth=2;gg.strokeRect(bx+1,by+1,bw-2,bh-2);
      gg.font=(cl<20?12:16)+'px '+FONT_D;gg.fillStyle=`rgba(255,90,90,${0.6+0.4*Math.sin(now/100)})`;
      gg.textAlign='center';gg.fillText('¡PELIGRO!',bx+bw/2,by+(cl<20?14:20));gg.textAlign='left';}
    if(!this.alive){gg.fillStyle='rgba(0,0,0,.62)';gg.fillRect(bx,by,bw,bh);
      gg.textAlign='center';
      gg.font=(cl<20?20:30)+'px '+FONT_D;gg.fillStyle='#ff5544';
      gg.shadowColor='#ff2200';gg.shadowBlur=10;
      gg.fillText('ELIMINADO',bx+bw/2,by+bh/2-6);gg.shadowBlur=0;
      if(this.rank){gg.font=(cl<20?15:22)+'px '+FONT_D;gg.fillStyle='#aa7766';
        gg.fillText(this.rank+'º PUESTO',bx+bw/2,by+bh/2+(cl<20?14:24));}
      gg.textAlign='left';}
    gg.strokeStyle=this.alive?'#00aa44':'#552222';gg.lineWidth=2;gg.strokeRect(bx,by,bw,bh);
    gg.strokeStyle=this.alive?'#00ff41':'#883333';gg.lineWidth=3;
    const L=cl<20?9:14;
    [[bx-4,by-4,1,1],[bx+bw+4,by-4,-1,1],[bx-4,by+bh+4,1,-1],[bx+bw+4,by+bh+4,-1,-1]].forEach(([cx,cy,dx,dy])=>{
      gg.beginPath();gg.moveTo(cx,cy+L*dy);gg.lineTo(cx,cy);gg.lineTo(cx+L*dx,cy);gg.stroke();});
    if(this.pendingG>0){const h=Math.min(this.pendingG,ROWS)*cl;
      const gx=this.garbSide>0?bx+bw+6:bx-13;
      gg.fillStyle=`rgba(255,50,40,${0.5+0.3*Math.sin(now/100)})`;
      gg.fillRect(gx,by+bh-h,7,h);
      gg.strokeStyle='#aa3322';gg.strokeRect(gx,by,7,bh);}
    if(cl>=20)for(let i=0;i<this.shields;i++){gg.strokeStyle='#66ffcc';gg.lineWidth=2;
      gg.beginPath();gg.arc(bx+16+i*18,by-12,6,0,7);gg.stroke();}
    gg.restore();
  }
  tag(gg,text,color,now,blink){if(blink&&Math.floor(now/250)%2)return;
    gg.font=(this.cell<20?13:15)+'px '+FONT_D;gg.textAlign='center';gg.fillStyle=color;
    gg.shadowColor=color;gg.shadowBlur=8;
    gg.fillText(text,this.bx+this.bw/2,this.tagY);gg.shadowBlur=0;gg.textAlign='left';}
}

/* ================= JUGADOR REMOTO ================= */
class RemotePlayer{
  constructor(slot,bx,by,cell){
    this.slot=slot;this.bx=bx;this.by=by;this.cell=cell;
    this.bw=cell*COLS;this.bh=cell*ROWS;
    this.remote=true;this.snap=null;
    this.label='P'+(slot+1);
    this.garbSide=(bx+this.bw/2<W/2)?1:-1;
    this.tagY=by+this.bh+(cell<20?58:22);
    this.shakeT=0;
  }
  draw(gg,now){
    const s=this.snap,bx=this.bx,by=this.by,cl=this.cell,bw=this.bw,bh=this.bh;
    gg.save();
    if(s&&s.fx.bo&&Math.random()<0.3)gg.translate(rnd(-2,2),rnd(-2,2));
    gg.fillStyle='rgba(0,9,2,.82)';gg.fillRect(bx,by,bw,bh);
    gg.strokeStyle='rgba(0,255,65,.06)';gg.lineWidth=1;
    for(let x=1;x<COLS;x++){gg.beginPath();gg.moveTo(bx+x*cl,by);gg.lineTo(bx+x*cl,by+bh);gg.stroke();}
    for(let y=1;y<ROWS;y++){gg.beginPath();gg.moveTo(bx,by+y*cl);gg.lineTo(bx+bw,by+y*cl);gg.stroke();}
    const sc=cl/26;
    if(s){
      for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
        const v=s.b[y*COLS+x];
        if(v){gg.save();gg.translate(bx+x*cl,by+y*cl);gg.scale(sc,sc);
          gg.drawImage(SPR[DEC[v]],0,0);gg.restore();}}
      if(s.cl){const ph=Math.sin(now*0.035);
        s.cl.forEach(y=>{gg.globalAlpha=0.4+0.4*Math.abs(ph);
          gg.fillStyle=ph>0?'#ffffff':'#aaffcc';gg.fillRect(bx,by+y*cl,bw,cl);});
        gg.globalAlpha=1;}
      if(s.pc&&s.al){
        gg.strokeStyle=COLORS[s.pc.n];gg.globalAlpha=0.3;gg.setLineDash([3,3]);
        s.pc.c.forEach(([cx,cy])=>gg.strokeRect(bx+(s.pc.x+cx)*cl+2,by+(s.pc.y+cy)*cl+2,cl-4,cl-4));
        gg.setLineDash([]);gg.globalAlpha=1;
        s.pc.c.forEach(([cx,cy])=>{const py=s.pc.y+cy;
          if(py>=0){gg.save();gg.translate(bx+(s.pc.x+cx)*cl,by+py*cl);gg.scale(sc,sc);
            gg.drawImage(SPR[s.pc.n],0,0);gg.restore();}});
      }
      if(s.fx.bo){const fl=Math.random()<0.1?0.5:0.94;
        gg.fillStyle=`rgba(0,0,0,${fl})`;gg.fillRect(bx,by,bw,bh);
        if(Math.random()<0.4){gg.fillStyle='rgba(170,255,200,.5)';
          gg.fillRect(bx+rnd(0,bw-60),by+rnd(0,bh),rnd(20,60),2);}}
      if(s.fx.fg){const gr=gg.createLinearGradient(0,by+bh*0.4,0,by+bh);
        gr.addColorStop(0,'rgba(0,14,2,0)');gr.addColorStop(0.5,'rgba(0,14,2,.88)');
        gr.addColorStop(1,'rgba(2,20,4,.97)');gg.fillStyle=gr;gg.fillRect(bx,by,bw,bh);}
      if(s.fx.sl)this.rtag(gg,'▼ LENTO','#ffdd66');
      if(s.fx.sp)this.rtag(gg,'▲ VELOCIDAD x2','#66ffcc');
      if(s.fx.iv)this.rtag(gg,'⇄ INVERTIDO','#ff88aa');
      if(s.fx.fr)this.rtag(gg,'❄ CONGELADO','#aaffff');
      if(s.dn){const a=0.25+0.2*Math.sin(now/120);
        gg.strokeStyle=`rgba(255,60,60,${a+0.3})`;gg.lineWidth=2;gg.strokeRect(bx+1,by+1,bw-2,bh-2);}
      if(!s.al){gg.fillStyle='rgba(0,0,0,.62)';gg.fillRect(bx,by,bw,bh);
        gg.textAlign='center';
        gg.font=(cl<20?20:30)+'px '+FONT_D;gg.fillStyle='#ff5544';
        gg.shadowColor='#ff2200';gg.shadowBlur=10;
        gg.fillText('ELIMINADO',bx+bw/2,by+bh/2-6);gg.shadowBlur=0;
        if(s.rk&&s.rk<90){gg.font=(cl<20?15:22)+'px '+FONT_D;gg.fillStyle='#aa7766';
          gg.fillText(s.rk+'º PUESTO',bx+bw/2,by+bh/2+(cl<20?14:24));}
        gg.textAlign='left';}
      if(s.pg>0){const h=Math.min(s.pg,ROWS)*cl;
        const gx=this.garbSide>0?bx+bw+6:bx-13;
        gg.fillStyle=`rgba(255,50,40,${0.5+0.3*Math.sin(now/100)})`;
        gg.fillRect(gx,by+bh-h,7,h);
        gg.strokeStyle='#aa3322';gg.strokeRect(gx,by,7,bh);}
      if(cl>=20)for(let i=0;i<s.sh;i++){gg.strokeStyle='#66ffcc';gg.lineWidth=2;
        gg.beginPath();gg.arc(bx+16+i*18,by-12,6,0,7);gg.stroke();}
    }else{
      gg.textAlign='center';gg.font='16px '+FONT_D;gg.fillStyle='#005522';
      if(Math.floor(now/400)%2)gg.fillText('SIN SEÑAL...',bx+bw/2,by+bh/2);
      gg.textAlign='left';
    }
    gg.strokeStyle=(s&&s.al)?'#00aa44':'#552222';gg.lineWidth=2;gg.strokeRect(bx,by,bw,bh);
    gg.strokeStyle=(s&&s.al)?'#00ff41':'#883333';gg.lineWidth=3;
    const L=cl<20?9:14;
    [[bx-4,by-4,1,1],[bx+bw+4,by-4,-1,1],[bx-4,by+bh+4,1,-1],[bx+bw+4,by+bh+4,-1,-1]].forEach(([cx,cy,dx,dy])=>{
      gg.beginPath();gg.moveTo(cx,cy+L*dy);gg.lineTo(cx,cy);gg.lineTo(cx+L*dx,cy);gg.stroke();});
    gg.restore();
  }
  rtag(gg,text,color){gg.font=(this.cell<20?13:15)+'px '+FONT_D;gg.textAlign='center';
    gg.fillStyle=color;gg.shadowColor=color;gg.shadowBlur=8;
    gg.fillText(text,this.bx+this.bw/2,this.tagY);gg.shadowBlur=0;gg.textAlign='left';}
}

/* ================= EFECTOS LOCALES ================= */
function quakePlayer(p){
  p.shakeT=3000;
  for(let i=0;i<9;i++){const x=ri(COLS),y=ri(ROWS);
    if(p.board[y][x]){const nx=clamp(x+(Math.random()>0.5?1:-1),0,COLS-1);
      if(!p.board[y][nx]){p.board[y][nx]=p.board[y][x];p.board[y][x]=null;}}}
  p.applyGravity();
  for(let i=0;i<14;i++)p.falling.push({x:ri(COLS),y:-p.cell*rnd(1,4),v:rnd(300,520)});
  burst(p.bx+p.bw/2,p.by+20,20,'#99bb88',220,420);
}
function blackoutPlayer(p,dur){p.blackoutT=dur;SFX.blackout();
  for(let i=0;i<4;i++)bolt(p.bx+rnd(10,p.bw-10),p.by+rnd(10,p.bh*0.4));}
function triggerSoloEvent(){

function layoutFor(n){
  if(n===1)return[{bx:350,by:84,cell:26}];
  if(n===2)return[{bx:140,by:84,cell:26},{bx:560,by:84,cell:26}];
  if(n===3)return[{bx:60,by:150,cell:20},{bx:380,by:150,cell:20},{bx:700,by:150,cell:20}];
  return[{bx:30,by:150,cell:16},{bx:276,by:150,cell:16},{bx:522,by:150,cell:16},{bx:768,by:150,cell:16}];
}
function buildOnlineBoards(){
  const n=Net.lobby.length;
  const L=layoutFor(n);
  const posBySlot={};
  Net.lobby.slice().sort((a,b)=>a.slot-b.slot).forEach((p,i)=>posBySlot[p.slot]=L[i]);
  const myPos=posBySlot[Net.slot];
  self=new Player(Net.slot,myPos.bx,myPos.by,myPos.cell,KEYMAPS[0]);
  players=[self];
  Net.lobby.forEach(p=>{
    if(p.slot===Net.slot)return;
    const pos=posBySlot[p.slot];
    players.push(new RemotePlayer(p.slot,pos.bx,pos.by,pos.cell));
    aliveMap[p.slot]=true;
  });
  gameTime=0;pendingEnd=null;winnerInfo=null;newRecord=false;paused=false;
  globalEvent=null;lastEventId='';eventClock=0;nextEventAt=rnd(12000,20000);
  banner=null;alertT=0;parts=[];rings=[];bolts=[];pops=[];cracks=[];trails=[];
  dasState={};arrState={};snapAcc=0;
}

const demo={cols:8,rows:13,cell:16,grid:null,cur:null,drop:0,flash:null};

function demoCan(dx,dy){for(const[cx,cy]of demo.cur.cells){const nx=demo.cur.x+cx+dx,ny=demo.cur.y+cy+dy;
  if(nx<0||nx>=demo.cols||ny>=demo.rows)return false;

function demoUpdate(dt){
  if(demo.flash){demo.flash.t-=dt;
    if(demo.flash.t<=0){demo.flash.rows.sort((a,b)=>a-b).forEach(y=>{
      demo.grid.splice(y,1);demo.grid.unshift(Array(demo.cols).fill(null));});demo.flash=null;}return;}
  if(!demo.cur){const n=PNAMES[ri(PNAMES.length)];
    demo.cur={name:n,cells:SHAPES[n].map(c=>[...c]),x:ri(demo.cols-3),y:0};demo.drop=0;
    if(!demoCan(0,0)){demo.grid=Array.from({length:demo.rows},()=>Array(demo.cols).fill(null));return;}}
  demo.drop+=dt;
  while(demo.drop>480){demo.drop-=480;
    if(demoCan(0,1))demo.cur.y++;
    else{let top=false;
      for(const[cx,cy]of demo.cur.cells){const ny=demo.cur.y+cy;if(ny<0){top=true;continue;}
        demo.grid[ny][demo.cur.x+cx]=demo.cur.name;}
      const rows=[];for(let y=0;y<demo.rows;y++)if(demo.grid[y].every(c=>c))rows.push(y);
      if(rows.length)demo.flash={rows,t:300};
      demo.cur=null;break;}}}

/* ================= UPDATE / RENDER ================= */
function update(dt,now){
  stateT+=dt;updRain(dt);updFX(dt);
  if(crtTarget>crtOff)crtOff=Math.min(crtTarget,crtOff+dt/700);
  else if(crtTarget<crtOff)crtOff=Math.max(crtTarget,crtOff-dt/450);
  if(state==='boot'){bootT+=dt;
    const total=BOOT_LINES.join('').length*14;
    if(bootT>total+1100){state='menu';stateT=0;}}
  else if(state==='menu'){demoUpdate(dt);}
  else if(state==='countdown'){
    const prev=Math.floor(countT/800);countT+=dt;
    const cur=Math.floor(countT/800);
    if(cur!==prev){if(cur<3)SFX.count();else SFX.go();}
    if(countT>=3200){state='playing';startMusic();}}
  else if(state==='playing'&&!paused){
    gameTime+=dt;eventClock+=dt;
    const isScheduler=mode==='solo'||Net.isHost;
    if(isScheduler&&eventClock>=nextEventAt&&!globalEvent){
      if(mode==='solo')triggerSoloEvent();else hostTriggerEvent();
      eventClock=0;nextEventAt=rnd(16000,32000);}
    if(globalEvent){
      if(globalEvent.id==='storm'){stormAcc+=dt;
        if(stormAcc>380){stormAcc=0;
          if(self&&self.alive)self.falling.push({x:ri(COLS),y:-self.cell,v:rnd(320,520)});
          if(Math.random()<0.5)SFX.tick();}}
      if(gameTime>=globalEvent.tEnd){
        if(self){self.invertT=0;self.fogT=0;}
        globalEvent=null;}}
    if(self){
      if(self.alive&&pendingEnd===null){
        handleDAS('L',keysDown.has(self.keys.left),dt,()=>self.move(-1));
        handleDAS('R',keysDown.has(self.keys.right),dt,()=>self.move(1));
        const dh=keysDown.has(self.keys.down);
        if(dh){self.softAcc+=dt;while(self.softAcc>45){self.softAcc-=45;self.softDrop();}}else self.softAcc=0;
      }
      self.update(dt);
      if(mode==='net'){snapAcc+=dt;if(snapAcc>=90){snapAcc=0;sendSnap();}}
    }
    if(mode==='solo'&&pendingEnd!==null){pendingEnd-=dt;if(pendingEnd<=0)beginSoloOver();}
  }
  else if(state==='crtoff'&&crtOff>=0.995){state='gameover';stateT=0;crtTarget=0;
    setTimeout(()=>SFX.crtOn(),150);}
}
function render(now){
  g.setTransform(1,0,0,1,0,0);
  g.fillStyle='#000800';g.fillRect(0,0,W,H);
  g.save();
  if(shakeT>0){const m=shakeMag*(shakeT/shakeDur);g.translate(rnd(-m,m),rnd(-m,m));}
  drawRain(g);
  if(state==='boot')drawBoot(g);
  else if(state==='menu')drawMenu(g,now);
  else if(state==='join')drawJoin(g,now);
  else if(state==='joinwait')drawJoinWait(g,now);
  else if(state==='lobby')drawLobby(g,now);
  else if(state==='countdown'){drawGame(g,now);drawCountdown(g,now);}
  else if(state==='playing'||state==='crtoff')drawGame(g,now);
  else if(state==='gameover'){drawGame(g,now);drawGameOver(g,now);}
  g.restore();
  glPass(now);
}
let lastT=performance.now();
function loop(now){
  const dt=Math.min(now-lastT,50);lastT=now;
  update(dt,now);render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= ENTRADA ================= */
function menuActivate(i){
  if(i===0)startSolo();
  else if(i===1){initAudio();hostGame();}
  else if(i===2){initAudio();joinCode='';state='join';}
  else if(i===3)toggleMute();
  else if(i===4)cycleCurv();}
function toggleMute(){muted=!muted;if(master)master.gain.value=muted?0:0.75;SFX.nav();}
function cycleCurv(){curvIdx=(curvIdx+1)%3;SFX.nav();}
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();
  initAudio();if(AC&&AC.state==='suspended')AC.resume();
  if(state==='boot'){state='menu';stateT=0;return;}
  if(k==='m'){toggleMute();return;}
  if(state==='menu'){
    if(k==='arrowup'){menuSel=(menuSel+4)%5;SFX.nav();}
    else if(k==='arrowdown'){menuSel=(menuSel+1)%5;SFX.nav();}
    else if(k==='enter'){e.preventDefault();menuActivate(menuSel);}
    else if(k==='1')startSolo();
    else if(k==='2')menuActivate(1);
    else if(k==='3')menuActivate(2);
    else if(k==='c')cycleCurv();
    return;}
  if(state==='join'){
    if(k==='escape'){state='menu';return;}
    if(k==='backspace'){joinCode=joinCode.slice(0,-1);return;}
    if(k==='enter'&&joinCode.length===5){joinGame(joinCode);return;}
    if(/^[a-z0-9]$/i.test(k)&&joinCode.length<5){
      let ch=k.toUpperCase();if(ch==='0')ch='O';if(ch==='1')ch='I';
      joinCode+=ch;SFX.nav();}
    return;}
  if(state==='lobby'){
    if(k==='escape'){toMenu();return;}
    if(k==='enter'&&Net.isHost&&Net.lobby.length>=2){
      Net.started=true;
      hostBroadcast({t:'start'});
      netCountdownStart();}
    return;}
  if(state==='gameover'){
    if(k==='escape'){toMenu();return;}
    if(k==='enter'){
      if(mode==='solo')startSolo();
      else if(Net.isHost){hostBroadcast({t:'start'});netCountdownStart();}}
    return;}
  if(state!=='playing')return;
  if(k==='p'){paused=!paused;SFX.nav();
    if(musicGain)musicGain.gain.value=paused?0.25:0.8;return;}
  if(k==='escape'){toMenu();return;}
  if(paused)return;
  keysDown.add(k);
  if(self&&self.alive){
    if(k===self.keys.left)self.move(-1);
    else if(k===self.keys.right)self.move(1);
    else if(k===self.keys.rot)self.rotate();
    else if(k===self.keys.down)self.softDrop();
    else if(k===self.keys.drop){e.preventDefault();self.hardDrop();}
    else if(k===self.keys.item)self.usePowerup();}
});
document.addEventListener('keyup',e=>keysDown.delete(e.key.toLowerCase()));
window.addEventListener('blur',()=>keysDown.clear());
window.addEventListener('beforeunload',()=>cleanupNet());
tubeEl.addEventListener('mousemove',e=>{
  const r=display.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*W,my=(e.clientY-r.top)/r.height*H;
  if(state!=='menu')return;
  let hov=-1;
  menuRects.forEach(rc=>{if(mx>=rc.x&&mx<=rc.x+rc.w&&my>=rc.y&&my<=rc.y+rc.h)hov=rc.i;});
  if(hov!==lastHover){if(hov>=0)SFX.nav();lastHover=hov;if(hov>=0)menuSel=hov;}
  tubeEl.style.cursor=hov>=0?'pointer':'default';});
tubeEl.addEventListener('click',()=>{
  initAudio();if(AC&&AC.state==='suspended')AC.resume();
  if(state==='boot'){state='menu';return;}
  if(state==='menu'&&lastHover>=0)menuActivate(lastHover);
  else if(state==='gameover'&&mode==='solo')startSolo();});
for(let i=0;i<14;i++){const m=document.createElement('div');m.className='mote';
  m.style.left=rnd(0,100)+'vw';m.style.top=rnd(20,110)+'vh';
  m.style.animationDuration=rnd(14,34)+'s';m.style.animationDelay=-rnd(0,20)+'s';
  document.body.appendChild(m);}
</script>
